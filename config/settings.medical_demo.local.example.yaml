# Medical demo local configuration template
# Copy this file to `config/settings.medical_demo.local.yaml`
# and only replace the placeholder API key fields before running ingest/query.

llm:
  provider: "openai"
  model: "gpt-4o"
  deployment_name: "gpt-4o"
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  api_version: "2024-02-15-preview"
  api_key: "OPTIONAL_IF_UNUSED"
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: "openai"
  model: "text-embedding-ada-002"
  dimensions: 1536
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  deployment_name: "text-embedding-ada-002"
  api_version: "2024-02-15-preview"
  api_key: "REPLACE_WITH_VALID_OPENAI_OR_AZURE_KEY"

vision_llm:
  enabled: false
  provider: "openai"
  model: "gpt-4o"
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  deployment_name: "gpt-4o"
  api_version: "2024-02-15-preview"
  api_key: "OPTIONAL_IF_UNUSED"
  max_image_size: 2048

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "medical_demo_v01"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: false
  provider: "none"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 100
  chunk_refiner:
    use_llm: false
  metadata_enricher:
    use_llm: false
