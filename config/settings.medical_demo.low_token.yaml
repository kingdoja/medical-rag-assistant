llm:
  provider: "openai"
  model: "qwen-plus"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: null
  temperature: 0.0
  max_tokens: 4096

embedding:
  provider: "openai"
  model: "text-embedding-v3"
  dimensions: 1024
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: null

vision_llm:
  enabled: false
  provider: "openai"
  model: "gpt-4o"
  azure_endpoint: "https://YOUR_ENDPOINT.openai.azure.com/"
  deployment_name: "gpt-4o"
  api_version: "2024-02-15-preview"
  api_key: null
  max_image_size: 2048

vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "medical_demo_v01"

retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

rerank:
  enabled: false
  provider: "none"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

evaluation:
  enabled: false
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"

observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 10
  chunk_refiner:
    use_llm: false
    max_workers: 2
    max_llm_chunks: 0
  metadata_enricher:
    use_llm: false
    max_workers: 2
    max_llm_chunks: 0
